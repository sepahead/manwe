<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Manwe perception proving ground: inside a graduated instrument dial, a target drone is held in detection brackets; two camera pods triangulate it, direction-of-arrival arcs rise from a microphone, and a second target is being acquired on a dashed predicted path — the training ground for airspace perception.">
  <title>Manwe — Perception Proving Ground (training the eyes that watch the sky)</title>
  <defs>
    <radialGradient id="sky" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#10202f"/>
      <stop offset="60%" stop-color="#0a1420"/>
      <stop offset="100%" stop-color="#050a11"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rim{fill:none;stroke:#38bdf8;stroke-width:2.4;stroke-opacity:.9}
      .rimdark{fill:none;stroke:#0a1a24;stroke-width:5.6}
      .rimglow{fill:none;stroke:#38bdf8;stroke-width:7;stroke-opacity:.2;filter:url(#glow)}
      .innerring{fill:none;stroke:#38bdf8;stroke-opacity:.35;stroke-width:1}
      .grad{stroke:#38bdf8;stroke-opacity:.5;stroke-width:1.4;stroke-linecap:round}
      .gradmaj{stroke:#38bdf8;stroke-opacity:.9;stroke-width:2.2;stroke-linecap:round}
      .range{fill:none;stroke:#38bdf8;stroke-opacity:.12;stroke-width:1}
      .drone{fill:none;stroke:#bfe9ff;stroke-width:3;stroke-linecap:round}
      .rotor{fill:none;stroke:#7dd3fc;stroke-width:2}
      .rhub{fill:#bfe9ff}
      .body{fill:#0a1826;stroke:#bfe9ff;stroke-width:1.8}
      .bracket{fill:none;stroke:#38bdf8;stroke-width:2.6;stroke-linecap:round;filter:url(#glow)}
      .ray{stroke:#7dd3fc;stroke-width:1.3;stroke-opacity:.55;stroke-linecap:round}
      .pod{fill:#0a1826;stroke:#38bdf8;stroke-width:1.6}
      .lens{fill:#7dd3fc}
      .doa{fill:none;stroke:#7dd3fc;stroke-width:1.6;stroke-linecap:round}
      .track{fill:none;stroke:#7dd3fc;stroke-width:1.3;stroke-dasharray:3 4;stroke-opacity:.6}
      .t2{fill:#bfe9ff}
      .acq{fill:none;stroke:#38bdf8;stroke-width:1.4;stroke-linecap:round;stroke-opacity:.85}
      .wind{fill:none;stroke:#7dd3fc;stroke-linecap:round}
      .d1{animation:ripple 2.8s ease-out infinite}
      .d2{animation:ripple 2.8s ease-out infinite;animation-delay:1.4s}
      .t2p{animation:blink 2.2s ease-in-out infinite}
      @keyframes ripple{0%{opacity:.9}70%{opacity:.2}100%{opacity:.9}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
      @media (prefers-reduced-motion:reduce){.d1,.d2,.t2p{animation:none}}
      @media (prefers-color-scheme:light){.rimglow{stroke-opacity:.28}.rim{stroke-opacity:1}.rimdark{stroke:#123240}.gradmaj{stroke-opacity:1}}
    </style>
  </defs>

  <!-- sky disc -->
  <circle cx="120" cy="120" r="106" fill="url(#sky)"/>

  <!-- ground-plane range arcs (lower half) -->
  <path class="range" d="M78 214 A103 103 0 0 1 26 141"/>
  <path class="range" d="M162 214 A103 103 0 0 0 214 141"/>
  <path class="range" d="M62 178 A72 72 0 0 1 48 120"/>
  <path class="range" d="M178 178 A72 72 0 0 0 192 120"/>

  <!-- instrument dial: graduations between inner ring and rim -->
  <circle class="innerring" cx="120" cy="120" r="94"/>
  <g>
    <line class="gradmaj" x1="120" y1="10" x2="120" y2="24"/>
    <line class="gradmaj" x1="120" y1="216" x2="120" y2="230"/>
    <line class="gradmaj" x1="10" y1="120" x2="24" y2="120"/>
    <line class="gradmaj" x1="216" y1="120" x2="230" y2="120"/>
    <line class="grad" x1="170" y1="33.4" x2="166" y2="40.3"/>
    <line class="grad" x1="206.6" y1="70" x2="199.7" y2="74"/>
    <line class="grad" x1="206.6" y1="170" x2="199.7" y2="166"/>
    <line class="grad" x1="170" y1="206.6" x2="166" y2="199.7"/>
    <line class="grad" x1="70" y1="206.6" x2="74" y2="199.7"/>
    <line class="grad" x1="33.4" y1="170" x2="40.3" y2="166"/>
    <line class="grad" x1="33.4" y1="70" x2="40.3" y2="74"/>
    <line class="grad" x1="70" y1="33.4" x2="74" y2="40.3"/>
  </g>

  <!-- wind: three tapered strokes, Manwe's air kept quiet -->
  <path class="wind" d="M50 60 Q64 53 78 60" stroke-width="2.6" stroke-opacity="0.4"/>
  <path class="wind" d="M44 73 Q60 65 76 73" stroke-width="2" stroke-opacity="0.28"/>
  <path class="wind" d="M40 86 Q57 78 74 86" stroke-width="1.4" stroke-opacity="0.18"/>

  <!-- target drone held in detection brackets -->
  <g>
    <path class="drone" d="M106 82 L134 110 M134 82 L106 110"/>
    <circle class="rotor" cx="106" cy="82" r="7"/>
    <circle class="rotor" cx="134" cy="82" r="7"/>
    <circle class="rotor" cx="106" cy="110" r="7"/>
    <circle class="rotor" cx="134" cy="110" r="7"/>
    <circle class="rhub" cx="106" cy="82" r="1.3"/>
    <circle class="rhub" cx="134" cy="82" r="1.3"/>
    <circle class="rhub" cx="106" cy="110" r="1.3"/>
    <circle class="rhub" cx="134" cy="110" r="1.3"/>
    <path class="body" d="M120 90 L126 96 L120 102 L114 96 Z"/>
    <path class="bracket" d="M88 74 V62 H100"/>
    <path class="bracket" d="M140 62 H152 V74"/>
    <path class="bracket" d="M152 118 V130 H140"/>
    <path class="bracket" d="M100 130 H88 V118"/>
  </g>

  <!-- second target: being acquired on a predicted path -->
  <path class="track" d="M150 74 Q162 64 172 56 T188 48"/>
  <g class="t2p">
    <circle class="t2" cx="172" cy="56" r="2.8" filter="url(#glow)"/>
    <path class="acq" d="M164 52 V48 H168"/>
    <path class="acq" d="M180 60 V64 H176"/>
  </g>

  <!-- camera pods triangulating the target (diamond pods, ecosystem node language) -->
  <g>
    <line class="ray" x1="58" y1="171" x2="115" y2="101"/>
    <line class="ray" x1="182" y1="171" x2="125" y2="101"/>
    <path class="pod" d="M58 164 L65 171 L58 178 L51 171 Z"/>
    <circle class="lens" cx="58" cy="171" r="2.2"/>
    <path class="pod" d="M182 164 L189 171 L182 178 L175 171 Z"/>
    <circle class="lens" cx="182" cy="171" r="2.2"/>
  </g>

  <!-- acoustic node: direction-of-arrival arcs rising toward the target -->
  <g>
    <path class="pod" d="M120 190 L125 195 L120 200 L115 195 Z"/>
    <circle class="lens" cx="120" cy="195" r="1.6"/>
    <path class="doa d1" d="M104 184 A20 20 0 0 1 136 184"/>
    <path class="doa d2" d="M96 174 A32 32 0 0 1 144 174" stroke-opacity="0.6"/>
  </g>

  <!-- bezel: halo, dark under-stroke, bright core -->
  <circle class="rimglow" cx="120" cy="120" r="104"/>
  <circle class="rimdark" cx="120" cy="120" r="104"/>
  <circle class="rim" cx="120" cy="120" r="104"/>
</svg>
