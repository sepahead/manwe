<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Manwe perception proving ground: inside a graduated sky scope, a target drone is held in detection brackets; two camera rays triangulate it, acoustic arcs rise from a microphone below, and a second tracked target follows a dashed predicted path — the training ground for airspace perception.">
  <title>Manwe — Perception Proving Ground (training the eyes that watch the sky)</title>
  <defs>
    <radialGradient id="sky" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0d2236"/>
      <stop offset="60%" stop-color="#081524"/>
      <stop offset="100%" stop-color="#040a12"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bezel{fill:none;stroke:#38bdf8;stroke-width:2.4;stroke-opacity:.9}
      .bezelglow{fill:none;stroke:#38bdf8;stroke-width:5;stroke-opacity:.22;filter:url(#glow)}
      .grad{stroke:#38bdf8;stroke-opacity:.4;stroke-width:1.6;stroke-linecap:round}
      .gradmaj{stroke:#38bdf8;stroke-opacity:.6;stroke-width:2;stroke-linecap:round}
      .drone{fill:none;stroke:#bfe9ff;stroke-width:3;stroke-linecap:round}
      .rotor{fill:none;stroke:#7dd3fc;stroke-width:2}
      .body{fill:#bfe9ff}
      .bracket{fill:none;stroke:#38bdf8;stroke-width:2.6;stroke-linecap:round;filter:url(#glow)}
      .ray{stroke:#7dd3fc;stroke-width:1.3;stroke-opacity:.55;stroke-linecap:round}
      .cam{fill:#0a1826;stroke:#38bdf8;stroke-width:1.6}
      .lens{fill:#7dd3fc}
      .doa{fill:none;stroke:#7dd3fc;stroke-width:1.6;stroke-linecap:round}
      .track{fill:none;stroke:#7dd3fc;stroke-width:1.3;stroke-dasharray:3 4;stroke-opacity:.6}
      .t2{fill:#bfe9ff}
      .wind{fill:none;stroke:#7dd3fc;stroke-width:2;stroke-linecap:round;stroke-opacity:.35}
      .d1{animation:ripple 2.8s ease-out infinite}
      .d2{animation:ripple 2.8s ease-out infinite;animation-delay:1.4s}
      .t2p{animation:blink 2.2s ease-in-out infinite}
      @keyframes ripple{0%{opacity:.9}70%{opacity:.2}100%{opacity:.9}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
      @media (prefers-reduced-motion:reduce){.d1,.d2,.t2p{animation:none}}
    </style>
  </defs>

  <!-- sky disc -->
  <circle cx="120" cy="120" r="106" fill="url(#sky)"/>

  <!-- calibration graduations on the bezel (proving-ground dial) -->
  <g>
    <line class="gradmaj" x1="120" y1="18" x2="120" y2="28"/>
    <line class="gradmaj" x1="120" y1="212" x2="120" y2="222"/>
    <line class="gradmaj" x1="18" y1="120" x2="28" y2="120"/>
    <line class="gradmaj" x1="212" y1="120" x2="222" y2="120"/>
    <line class="grad" x1="171" y1="31.7" x2="167" y2="38.6"/>
    <line class="grad" x1="208.3" y1="69" x2="201.4" y2="73"/>
    <line class="grad" x1="208.3" y1="171" x2="201.4" y2="167"/>
    <line class="grad" x1="171" y1="208.3" x2="167" y2="201.4"/>
    <line class="grad" x1="69" y1="208.3" x2="73" y2="201.4"/>
    <line class="grad" x1="31.7" y1="171" x2="38.6" y2="167"/>
    <line class="grad" x1="31.7" y1="69" x2="38.6" y2="73"/>
    <line class="grad" x1="69" y1="31.7" x2="73" y2="38.6"/>
  </g>

  <!-- wind chevrons: Manwe's air, kept quiet -->
  <path class="wind" d="M52 62 Q64 56 76 62"/>
  <path class="wind" d="M46 76 Q60 69 74 76" stroke-opacity="0.25"/>

  <!-- target drone in detection brackets -->
  <g>
    <path class="drone" d="M106 82 L134 110 M134 82 L106 110"/>
    <circle class="rotor" cx="106" cy="82" r="7"/>
    <circle class="rotor" cx="134" cy="82" r="7"/>
    <circle class="rotor" cx="106" cy="110" r="7"/>
    <circle class="rotor" cx="134" cy="110" r="7"/>
    <circle class="body" cx="120" cy="96" r="4.5"/>
    <path class="bracket" d="M88 74 V62 H100"/>
    <path class="bracket" d="M140 62 H152 V74"/>
    <path class="bracket" d="M152 118 V130 H140"/>
    <path class="bracket" d="M100 130 H88 V118"/>
  </g>

  <!-- second tracked target on a predicted path -->
  <path class="track" d="M150 74 Q162 64 172 56 T188 48"/>
  <circle class="t2 t2p" cx="172" cy="56" r="2.8" filter="url(#glow)"/>

  <!-- camera pair triangulating the target -->
  <g>
    <line class="ray" x1="58" y1="172" x2="112" y2="106"/>
    <line class="ray" x1="182" y1="172" x2="128" y2="106"/>
    <rect class="cam" x="50" y="166" width="16" height="12" rx="2.5"/>
    <circle class="lens" cx="58" cy="172" r="2.2"/>
    <rect class="cam" x="174" y="166" width="16" height="12" rx="2.5"/>
    <circle class="lens" cx="182" cy="172" r="2.2"/>
  </g>

  <!-- acoustic node: direction-of-arrival arcs rising toward the target -->
  <g>
    <circle class="body" cx="120" cy="196" r="3.2"/>
    <path class="doa d1" d="M104 186 A20 20 0 0 1 136 186"/>
    <path class="doa d2" d="M96 176 A32 32 0 0 1 144 176" stroke-opacity="0.6"/>
  </g>

  <!-- bezel -->
  <circle class="bezelglow" cx="120" cy="120" r="104"/>
  <circle class="bezel" cx="120" cy="120" r="104"/>
</svg>
